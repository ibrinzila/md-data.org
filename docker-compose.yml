services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mduser
      POSTGRES_PASSWORD: mdpass
      POSTGRES_DB: mddata
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  celery-worker:
    build: .
    env_file: .env
    command: celery -A celery_worker.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis

volumes:
  postgres_data:

